<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Clutch avatar">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="62%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.92"/>
      <stop offset="48%" stop-color="#4c1d95" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#060818"/>
    </radialGradient>
    <linearGradient id="rim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#bfdbfe" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#4c1d95" stop-opacity="0.35"/>
    </linearGradient>
    <filter id="logoGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="128" height="128" fill="#060818"/>
  <rect width="128" height="128" fill="url(#glow)"/>
  <circle cx="104" cy="22" r="20" fill="#bfdbfe" opacity="0.1"/>
  <circle cx="18" cy="112" r="26" fill="#60a5fa" opacity="0.07"/>
  <circle cx="96" cy="96" r="14" fill="#4c1d95" opacity="0.12"/>
  <rect x="2.5" y="2.5" width="123" height="123" rx="22" fill="none" stroke="url(#rim)" stroke-width="2.5"/>
  <image href="/logo-clutchclube.png" x="16" y="12" width="96" height="96" preserveAspectRatio="xMidYMid meet" filter="url(#logoGlow)"/>
</svg>